<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <title>三頁 Flask 網站</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        line-height: 1.6;
        background: #f7f9fc;
        color: #1d1f25;
      }
      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 0 16px;
      }
      nav {
        margin-bottom: 24px;
      }
      nav a {
        display: inline-block;
        margin-right: 12px;
        margin-bottom: 8px;
        padding: 12px 18px;
        border-radius: 10px;
        background: #2d6cdf;
        color: #fff;
        text-decoration: none;
        font-size: 1rem;
        transition: background 0.2s ease;
      }
      nav a:hover,
      nav a:focus-visible {
        background: #1f57b7;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      }
      th,
      td {
        text-align: left;
        padding: 14px 12px;
        border: 1px solid #d8e2ef;
      }
      th {
        background: #eef4ff;
        font-weight: 600;
      }
      tbody tr:nth-child(even) {
        background: #fbfdff;
      }
      button {
        font-size: 1rem;
        padding: 12px 18px;
        min-width: 110px;
        border: none;
        border-radius: 10px;
        background: #2d6cdf;
        color: #fff;
        cursor: pointer;
        transition: transform 0.15s ease, background 0.15s ease;
      }
      button:hover,
      button:focus-visible {
        background: #1f57b7;
        transform: translateY(-1px);
      }
      audio {
        width: 100%;
        margin-top: 18px;
      }
      h1 {
        font-size: 1.9rem;
        margin-bottom: 18px;
      }
      footer {
        margin-top: 36px;
        color: #5f6571;
        font-size: 0.95rem;
      }
      @media (max-width: 768px) {
        body {
          margin: 16px;
        }
        nav a {
          width: 100%;
          text-align: center;
        }
        th,
        td {
          padding: 12px 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <nav>
        <a href="/">第一頁</a>
        <a href="/page2">第二頁</a>
        <a href="/page3">第三頁</a>
      </nav>
      <hr>
      {% block content %}{% endblock %}
      <footer>
        <p>Flask 範例網站 · 共三頁</p>
      </footer>
    </div>
  </body>
</html>
